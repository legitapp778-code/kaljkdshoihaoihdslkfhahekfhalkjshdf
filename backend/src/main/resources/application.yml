server:
  port: ${PORT:8080}
  # Railway terminates SSL at the proxy — Spring runs HTTP internally
  # Do NOT configure SSL here

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/totemena?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048}
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    hikari:
      maximum-pool-size: 10        # Railway free tier: keep low
      minimum-idle: 2
      connection-timeout: 5000     # fail fast — 5s not 30s
      idle-timeout: 300000
      max-lifetime: 600000         # 10 min — Railway kills long-lived connections
      pool-name: ElitePool
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
      hibernate.type.preferred_uuid_jdbc_type: VARCHAR
      hibernate.jdbc.batch_size: 20
      hibernate.order_inserts: true
      hibernate.order_updates: true
      hibernate.jdbc.batch_versioned_data: true
      hibernate.generate_statistics: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      # Railway Redis addon provides REDIS_URL automatically

app:
  jwt:
    secret: ${JWT_SECRET}           # REQUIRED — no default in prod
    access-expiry-ms: 900000
    refresh-expiry-ms: 604800000
  otp:
    value: "1234"
    ttl-minutes: 5
    max-attempts: 3
  game:
    betting-phase-seconds: 15
    spinning-phase-seconds: 7
    result-display-seconds: 3
    multiplier: 2.00
  websocket:
    # Wildcard — Railway domain is dynamic on free tier
    allowed-origins: "*"
  frontend:
    origin: ${FRONTEND_ORIGIN:*}

logging:
  level:
    com.totemena.elite: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.web.socket: WARN

# Railway health check — must respond fast
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
